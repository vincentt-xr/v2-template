name: Smoke Build
# Builds the base template against the published SDK exactly as a fresh scaffold
# would — a frozen install (resolving @vincentt-xr/sdk from npm), then build +
# typecheck. SDK_LINK is unset, so this is the npm path, not the local-link dev path.
#
# Catches any template change that breaks the production build, and — via the frozen
# lockfile — a dependency bump that wasn't reflected in the lockfile.

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck
